<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>💋 Verdad o Reto · Andrey & Nayelys</title>

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600;700&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0c0910;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 16px 12px 48px;
            overflow-x: hidden;
            position: relative;
        }

        /* ambient glow blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(80px);
            opacity: 0.18;
            animation: drift 14s ease-in-out infinite alternate;
        }
        .blob-1 { width: 420px; height: 420px; background: #ff4d7a; top: -100px; left: -120px; animation-duration: 14s; }
        .blob-2 { width: 350px; height: 350px; background: #c261f5; bottom: -80px; right: -100px; animation-duration: 18s; animation-direction: alternate-reverse; }
        .blob-3 { width: 240px; height: 240px; background: #f5b942; top: 40%; left: 50%; transform: translate(-50%,-50%); animation-duration: 20s; opacity: 0.1; }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(5%,4%); } }
        .blob-3 { animation: driftC 20s ease-in-out infinite alternate; }
        @keyframes driftC { from { transform: translate(-50%,-50%); } to { transform: translate(-44%,-54%); } }

        .wrap {
            max-width: 460px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 6px;
        }
        .header-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 8px;
            animation: heartbeat 2.8s ease-in-out infinite;
        }
        @keyframes heartbeat {
            0%,100% { transform: scale(1); }
            14%      { transform: scale(1.2); }
            28%      { transform: scale(1); }
            42%      { transform: scale(1.1); }
            56%      { transform: scale(1); }
        }
        .header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.1rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        .header h1 em {
            font-style: italic;
            background: linear-gradient(90deg, #ff4d7a, #f5b942, #c261f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .names {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.38);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: 600;
        }

        /* ── PANEL ── */
        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 22px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .panel-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.38);
            text-transform: uppercase;
            letter-spacing: 1.8px;
            font-weight: 700;
            margin-bottom: 11px;
            text-align: center;
        }

        /* ── PLAYER SELECT ── */
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .player-btn {
            padding: 12px 10px;
            border-radius: 50px;
            border: 1.5px solid rgba(255,255,255,0.12);
            background: transparent;
            color: rgba(255,255,255,0.4);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Inter', sans-serif;
        }
        .player-btn.andrey  { border-color: rgba(255,77,122,0.3); }
        .player-btn.nayelys { border-color: rgba(194,97,245,0.3); }
        .player-btn.andrey.active {
            background: rgba(255,77,122,0.18);
            border-color: #ff4d7a;
            color: #ff8faa;
            box-shadow: 0 0 20px rgba(255,77,122,0.22);
        }
        .player-btn.nayelys.active {
            background: rgba(194,97,245,0.18);
            border-color: #c261f5;
            color: #d49ff8;
            box-shadow: 0 0 20px rgba(194,97,245,0.22);
        }

        /* ── TURN BANNER ── */
        .turn-banner {
            text-align: center;
            padding: 11px 18px;
            border-radius: 50px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            font-size: 0.84rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
        }
        .turn-banner strong { color: #fff; }
        .blink { color: #f5b942 !important; animation: blink 1.1s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.35} }

        /* ── CARD ── */
        .card-area { margin-bottom: 12px; }
        .card-chip {
            min-height: 26px;
            margin-bottom: 8px;
            text-align: center;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 16px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .chip-verdad { background: rgba(72,199,142,0.16); color: #7ac9a0; border: 1px solid rgba(72,199,142,0.3); }
        .chip-reto   { background: rgba(255,107,53,0.16);  color: #ff8a60; border: 1px solid rgba(255,107,53,0.3);  }

        .card-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 22px;
            padding: 30px 22px 26px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: border-color 0.4s, box-shadow 0.4s;
            word-break: break-word;
        }
        .card-box.glow-verdad { border-color: rgba(72,199,142,0.4); box-shadow: 0 0 28px rgba(72,199,142,0.09); }
        .card-box.glow-reto   { border-color: rgba(255,107,53,0.4);  box-shadow: 0 0 28px rgba(255,107,53,0.09);  }
        .card-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            line-height: 1.6;
        }
        .card-idle { color: rgba(255,255,255,0.3); font-size: 0.9rem; line-height: 1.6; }

        @keyframes flip {
            0%   { opacity:1; transform:rotateY(0deg) scale(1); }
            40%  { opacity:0; transform:rotateY(90deg) scale(0.95); }
            60%  { opacity:0; transform:rotateY(90deg) scale(0.95); }
            100% { opacity:1; transform:rotateY(0deg) scale(1); }
        }
        .card-box.flipping { animation: flip 0.5s ease; }

        /* ── BUTTONS ── */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn {
            border: 1.5px solid rgba(255,255,255,0.1);
            padding: 14px 10px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.22s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            font-family: 'Inter', sans-serif;
            background: transparent;
            color: rgba(255,255,255,0.4);
            -webkit-tap-highlight-color: transparent;
        }
        .btn:disabled { opacity: 0.28; cursor: not-allowed; pointer-events: none; }
        .btn:not(:disabled):active { transform: scale(0.95); }

        .btn-v { border-color: rgba(72,199,142,0.4); color: #7ac9a0; }
        .btn-v:not(:disabled):hover { background: rgba(72,199,142,0.14); box-shadow: 0 0 18px rgba(72,199,142,0.14); }

        .btn-r { border-color: rgba(255,107,53,0.4); color: #ff8a60; }
        .btn-r:not(:disabled):hover { background: rgba(255,107,53,0.14); box-shadow: 0 0 18px rgba(255,107,53,0.14); }

        .btn-rand {
            width: 100%; padding: 14px; border-radius: 50px; margin-bottom: 12px;
            border-color: rgba(194,97,245,0.38); color: #d49ff8; font-size: 0.95rem;
        }
        .btn-rand:not(:disabled):hover { background: rgba(194,97,245,0.14); box-shadow: 0 0 20px rgba(194,97,245,0.18); }

        /* ── CHAT ── */
        .chat-header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
        }
        .chat-title { font-size: 0.7rem; font-weight: 700; color: rgba(255,255,255,0.38); text-transform: uppercase; letter-spacing: 1.8px; }
        .online-row { display: flex; gap: 10px; }
        .online-pill { display: flex; align-items: center; gap: 4px; font-size: 0.68rem; color: rgba(255,255,255,0.38); font-weight: 600; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #333; flex-shrink: 0; }
        .dot.on { background: #48c78e; box-shadow: 0 0 6px #48c78e; }

        .chat-msgs {
            max-height: 210px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 2px;
            margin-bottom: 12px;
            scroll-behavior: smooth;
        }
        .chat-msgs::-webkit-scrollbar { width: 3px; }
        .chat-msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }

        .chat-empty { text-align: center; color: rgba(255,255,255,0.25); font-size: 0.78rem; padding: 14px 0; }

        .msg {
            max-width: 84%;
            padding: 9px 14px 7px;
            border-radius: 18px;
            font-size: 0.84rem;
            word-break: break-word;
            line-height: 1.45;
            animation: msgIn 0.22s ease;
        }
        @keyframes msgIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none} }
        .msg.a {
            align-self: flex-end; margin-left: auto;
            background: rgba(255,77,122,0.16); color: #ffb0c6;
            border: 1px solid rgba(255,77,122,0.22);
            border-radius: 18px 18px 4px 18px;
        }
        .msg.n {
            align-self: flex-start;
            background: rgba(194,97,245,0.16); color: #d9b0f8;
            border: 1px solid rgba(194,97,245,0.22);
            border-radius: 18px 18px 18px 4px;
        }
        .msg-who { font-size: 0.62rem; font-weight: 700; opacity: 0.6; display: block; margin-bottom: 3px; }
        .msg-time { font-size: 0.58rem; opacity: 0.38; display: block; text-align: right; margin-top: 4px; }

        .chat-input-row { display: flex; gap: 8px; }
        .chat-in {
            flex: 1; padding: 11px 16px; border-radius: 50px;
            border: 1.5px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #fff; font-size: 0.85rem; outline: none;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .chat-in::placeholder { color: rgba(255,255,255,0.28); }
        .chat-in:focus { border-color: rgba(255,77,122,0.45); box-shadow: 0 0 14px rgba(255,77,122,0.1); }
        .chat-in:disabled { opacity: 0.3; cursor: not-allowed; }

        .chat-btn {
            padding: 11px 16px; border-radius: 50px;
            border: 1.5px solid rgba(255,77,122,0.35);
            background: rgba(255,77,122,0.14);
            color: #ff8faa; font-weight: 700; cursor: pointer;
            font-size: 1rem; transition: all 0.22s;
            -webkit-tap-highlight-color: transparent;
        }
        .chat-btn:hover:not(:disabled) { background: rgba(255,77,122,0.28); }
        .chat-btn:disabled { opacity: 0.28; cursor: not-allowed; }

        .chat-hint {
            text-align: center; font-size: 0.7rem;
            color: rgba(255,255,255,0.3); margin-top: 8px;
        }

        @media (max-width: 380px) {
            .header h1 { font-size: 1.75rem; }
            .btn { font-size: 0.82rem; padding: 12px 8px; }
            .card-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="wrap">

    <!-- HEADER -->
    <div class="header">
        <span class="header-icon">💋</span>
        <h1>Verdad <em>o</em> Reto</h1>
        <p class="names">Andrey &amp; Nayelys</p>
    </div>

    <!-- PLAYER -->
    <div class="panel">
        <p class="panel-label">👤 ¿Quién eres?</p>
        <div class="player-grid">
            <button class="player-btn andrey active" id="btnA">💖 Andrey</button>
            <button class="player-btn nayelys"        id="btnN">🦋 Nayelys</button>
        </div>
    </div>

    <!-- TURN -->
    <div class="turn-banner" id="turnBanner">🎯 Turno de: <strong id="turnName">Nayelys</strong></div>

    <!-- CARD -->
    <div class="card-area">
        <div class="card-chip" id="cardChip"></div>
        <div class="card-box" id="cardBox">
            <span class="card-text card-idle">Presiona Verdad, Reto<br>o Sorpresa para empezar 💫</span>
        </div>
    </div>

    <!-- BOTONES -->
    <div class="btn-row">
        <button class="btn btn-v" id="btnV" disabled>💚 Verdad</button>
        <button class="btn btn-r" id="btnR" disabled>🔥 Reto</button>
    </div>
    <button class="btn btn-rand" id="btnRand" disabled>🎲 ¡Sorpresa!</button>

    <!-- CHAT -->
    <div class="panel">
        <div class="chat-header">
            <span class="chat-title">💬 Chat</span>
            <div class="online-row" id="onlineRow"></div>
        </div>
        <div class="chat-msgs" id="chatMsgs">
            <p class="chat-empty">Aquí aparecerán las respuestas...</p>
        </div>
        <div class="chat-input-row">
            <input class="chat-in" id="chatIn" type="text" placeholder="Escribe tu respuesta..." maxlength="300" disabled>
            <button class="chat-btn" id="chatBtn" disabled>📩</button>
        </div>
        <p class="chat-hint" id="chatHint">⏳ Espera que elijan para ti</p>
    </div>

</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, onDisconnect }
       from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

/* ─── FIREBASE ─── */
const db = getDatabase(initializeApp({
    apiKey: "AIzaSyByB_5gP3sDwbCmVWbiB5CQXHzsKhcDvoo",
    authDomain: "chist-4aac2.firebaseapp.com",
    databaseURL: "https://chist-4aac2-default-rtdb.firebaseio.com",
    projectId: "chist-4aac2",
    storageBucket: "chist-4aac2.firebasestorage.app",
    messagingSenderId: "64011595640",
    appId: "1:64011595640:web:8fa8b005b916cf2af7628d"
}));

/* ─── TODAS LAS PREGUNTAS ─── */
const VERDADES = [
    "¿Cuál fue el momento exacto en que supiste que me querías?",
    "¿Qué canción escuchas cuando piensas en mí?",
    "¿Cuál es tu recuerdo favorito de nosotros hasta ahora?",
    "¿Qué parte de mi cuerpo te llama más la atención?",
    "Si pudieras revivir un momento conmigo, ¿cuál sería?",
    "¿Qué cosa pequeña que hago te hace sonreír sin darte cuenta?",
    "¿Alguna vez has tenido un sueño conmigo que no me hayas contado?",
    "¿Qué es lo más atrevido que has pensado hacer conmigo?",
    "¿Cuál es el beso que más recuerdas de los nuestros?",
    "¿Qué outfit mío te vuelve loco/a?",
    "¿Cuál es tu zona erógena favorita?",
    "¿Qué fantasía tienes conmigo que aún no me has contado?",
    "¿En qué momento te he puesto más nervioso/a de forma agradable?",
    "¿Hay algo que quieras que te haga y no me has pedido?",
    "¿Qué prefieren: lento y suave o intenso y apasionado?",
    "¿Cuál es el mensaje más hot que me has mandado o querido mandar?",
    "¿Cuál es tu fantasía más recurrente conmigo?",
    "¿Cuál es la posición que más disfrutas o más curiosidad te da?",
    "¿Dónde te gustaría que te tocara más suavemente?",
    "¿Qué ropa interior prefieres en mí?",
    "¿Cuál es tu recuerdo más caliente de nosotros?",
    "¿Alguna vez has visto algo que te excitó pensando en mí?",
    "¿Qué palabras o frases te activan más cuando estamos íntimos?",
    "¿Cuál es el lugar más loco donde has pensado estar conmigo?",
    "¿Qué juego de pareja te gustaría probar?",
    "Describe la noche perfecta contigo sin censura",
    "¿Qué es lo más loco que has querido hacer conmigo?",
    "¿Qué parte de hacer el amor contigo disfrutas más?",
    "¿Qué es algo que siempre has querido decirme pero no te has atrevido?",
    "¿Qué secreto guardas que crees que nunca descubriré?"
];

const RETOS = [
    "📸 Tómate el selfie más seductor que puedas ahora mismo",
    "🎤 Canta el coro de la canción que te recuerda a tu pareja",
    "💌 Escribe un mensaje de amor de 3 líneas en este chat",
    "🔥 Manda un mensaje tan coqueto que haga sonrojar",
    "💋 Describe en el chat qué le harías a tu pareja en este momento",
    "🗣️ Manda un audio con el tono más seductor que puedas",
    "📱 Manda tu foto favorita de ti mismo/a",
    "✍️ Escribe en detalle cómo sería la noche perfecta con tu pareja",
    "🌶️ Di en el chat qué parte del cuerpo de tu pareja besarías primero",
    "🎁 Promete algo atrevido que harás por tu pareja esta semana",
    "💃 Baila de forma seductora por 20 segundos (nadie te juzga)",
    "💦 Describe una fantasía que tienes con tu pareja",
    "🎭 Manda un audio describiendo lo que le harías a tu pareja sin censura",
    "🔑 Confiesa el deseo más íntimo que tienes y no has dicho",
    "🛏️ Escribe cómo sería despertar contigo un domingo sin planes",
    "📖 Lee en voz alta el último mensaje bonito que te enviaron",
    "🤫 Escribe la frase más atrevida que se te ocurra sobre ustedes",
    "🎯 Propón un juego de pareja para la próxima vez que se vean",
    "💌 Escribe el sexting más ardiente que puedas en este momento",
    "🪞 Descríbete a ti mismo/a de la forma más seductora posible",
    "🌟 Dedica una canción a tu pareja con un mensaje de por qué",
    "🎭 Inventa un escenario atrevido y cuéntaselo al otro",
    "📸 Manda la foto más atrevida con la que te sientas cómodo/a",
    "🤗 Di 3 cosas que te enloquecen de tu pareja físicamente",
    "💖 Escribe 5 razones por qué amas a tu pareja en 1 minuto"
];

/* ─── STATE ─── */
let myPlayer  = 'andrey';
let turnPlayer= 'nayelys';
let curCard   = null;
let curType   = null;
let waiting   = false;
let lastMsgTs = 0;
let presenceInterval = null;

/* ─── DOM ─── */
const btnA     = document.getElementById('btnA');
const btnN     = document.getElementById('btnN');
const btnV     = document.getElementById('btnV');
const btnR     = document.getElementById('btnR');
const btnRand  = document.getElementById('btnRand');
const turnBanner= document.getElementById('turnBanner');
const cardChip = document.getElementById('cardChip');
const cardBox  = document.getElementById('cardBox');
const chatMsgs = document.getElementById('chatMsgs');
const chatIn   = document.getElementById('chatIn');
const chatBtn  = document.getElementById('chatBtn');
const chatHint = document.getElementById('chatHint');
const onlineRow= document.getElementById('onlineRow');

/* ─── HELPERS ─── */
const rand = arr => arr[Math.floor(Math.random() * arr.length)];
const fmtT = ts => { const d = new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const scrollChat = () => { chatMsgs.scrollTop = chatMsgs.scrollHeight; };

/* ─── UPDATE UI ─── */
function updateUI() {
    const who    = turnPlayer === 'nayelys' ? 'Nayelys' : 'Andrey';
    const other  = turnPlayer === 'nayelys' ? 'Andrey'  : 'Nayelys';
    const myTurn = myPlayer === turnPlayer;

    if (waiting) {
        // hay carta activa
        if (myTurn) {
            turnBanner.innerHTML = `⚠️ <span class="blink">¡Responde!</span> <strong>${who}</strong>`;
            chatIn.disabled  = false;
            chatBtn.disabled = false;
            chatHint.textContent = '✍️ Escribe tu respuesta y presiona enviar';
            chatIn.placeholder   = 'Tu respuesta...';
            setTimeout(() => chatIn.focus(), 100);
        } else {
            turnBanner.innerHTML = `⌛ Esperando respuesta de <strong>${who}</strong>...`;
            chatIn.disabled  = true;
            chatBtn.disabled = true;
            chatHint.textContent = '👀 Espera la respuesta...';
            chatIn.placeholder   = 'Espera...';
        }
        btnV.disabled    = true;
        btnR.disabled    = true;
        btnRand.disabled = true;
    } else {
        // sin carta — alguien elige
        const canChoose = myPlayer !== turnPlayer;
        btnV.disabled    = !canChoose;
        btnR.disabled    = !canChoose;
        btnRand.disabled = !canChoose;
        chatIn.disabled  = true;
        chatBtn.disabled = true;

        if (canChoose) {
            turnBanner.innerHTML = `🎯 Elige para <strong>${who}</strong>`;
            chatHint.textContent = '🃏 Elige Verdad, Reto o Sorpresa';
        } else {
            turnBanner.innerHTML = `⏳ <strong>${other}</strong> está eligiendo para ti...`;
            chatHint.textContent = '⌛ Tu pareja elige para ti';
        }
    }
}

/* ─── DRAW ─── */
async function drawCard(type) {
    const card = type === 'verdad' ? rand(VERDADES) : rand(RETOS);

    cardBox.classList.remove('flipping');
    // force reflow para reiniciar animación
    void cardBox.offsetWidth;
    cardBox.classList.add('flipping');
    setTimeout(() => cardBox.classList.remove('flipping'), 520);

    await set(ref(db, 'verdadoreto/game'), {
        currentCard: card,
        currentType: type,
        turnPlayer,
        timestamp: Date.now()
    });
}

async function drawRandom() {
    await drawCard(Math.random() < 0.5 ? 'verdad' : 'reto');
}

/* ─── NEXT TURN ─── */
async function nextTurn() {
    const next = turnPlayer === 'nayelys' ? 'andrey' : 'nayelys';
    await set(ref(db, 'verdadoreto/game'), {
        currentCard: null,
        currentType: null,
        turnPlayer: next,
        timestamp: Date.now()
    });
}

/* ─── SEND MESSAGE ─── */
async function sendMessage() {
    const text = chatIn.value.trim();
    if (!text || !waiting || myPlayer !== turnPlayer) return;
    chatIn.value = '';

    await push(ref(db, 'verdadoreto/chat'), {
        from: myPlayer,
        text,
        timestamp: Date.now()
    });

    await nextTurn();
}

/* ─── LISTENERS ─── */
function listenGame() {
    onValue(ref(db, 'verdadoreto/game'), snap => {
        if (!snap.exists()) {
            set(ref(db, 'verdadoreto/game'), {
                currentCard: null, currentType: null,
                turnPlayer: 'nayelys', timestamp: Date.now()
            });
            return;
        }
        const g = snap.val();
        turnPlayer = g.turnPlayer || 'nayelys';
        curCard    = g.currentCard || null;
        curType    = g.currentType || null;
        waiting    = !!curCard;

        // render card
        if (curCard) {
            const who = turnPlayer === 'nayelys' ? 'Nayelys' : 'Andrey';
            if (curType === 'verdad') {
                cardChip.innerHTML = `<span class="chip chip-verdad">💚 Verdad para ${who}</span>`;
                cardBox.className  = 'card-box glow-verdad';
            } else {
                cardChip.innerHTML = `<span class="chip chip-reto">🔥 Reto para ${who}</span>`;
                cardBox.className  = 'card-box glow-reto';
            }
            cardBox.innerHTML = `<span class="card-text">${curCard}</span>`;
        } else {
            cardChip.innerHTML = '';
            cardBox.className  = 'card-box';
            cardBox.innerHTML  = `<span class="card-text card-idle">Presiona Verdad, Reto<br>o Sorpresa para empezar 💫</span>`;
        }

        updateUI();
    });
}

function listenChat() {
    onValue(ref(db, 'verdadoreto/chat'), snap => {
        chatMsgs.innerHTML = '';
        if (!snap.exists()) {
            chatMsgs.innerHTML = '<p class="chat-empty">Aquí aparecerán las respuestas...</p>';
            return;
        }

        const msgs = Object.values(snap.val()).sort((a, b) => a.timestamp - b.timestamp);

        msgs.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.from === 'andrey' ? 'a' : 'n'}`;
            div.innerHTML = `
                <span class="msg-who">${m.from === 'andrey' ? '💖 Andrey' : '🦋 Nayelys'}</span>
                ${escapeHtml(m.text)}
                <span class="msg-time">${fmtT(m.timestamp)}</span>
            `;
            chatMsgs.appendChild(div);
        });
        scrollChat();

        // detectar respuesta del que debía responder
        if (msgs.length && waiting) {
            const last = msgs[msgs.length - 1];
            if (last.from === turnPlayer && last.timestamp > lastMsgTs) {
                lastMsgTs = last.timestamp;
                // ya respondió — nextTurn lo llamó quien envió, pero actualizamos UI local
            }
        }
    });
}

function listenPresence() {
    onValue(ref(db, 'verdadoreto/presence'), snap => {
        const p   = snap.exists() ? snap.val() : {};
        const now = Date.now();
        const aOn = p.andrey  && (now - p.andrey  < 35000);
        const nOn = p.nayelys && (now - p.nayelys < 35000);
        onlineRow.innerHTML = `
            <span class="online-pill"><span class="dot ${aOn ? 'on' : ''}"></span>Andrey</span>
            <span class="online-pill"><span class="dot ${nOn ? 'on' : ''}"></span>Nayelys</span>
        `;
    });
}

async function setPresence() {
    if (presenceInterval) clearInterval(presenceInterval);
    const myRef = ref(db, `verdadoreto/presence/${myPlayer}`);
    await set(myRef, Date.now());
    presenceInterval = setInterval(() => set(myRef, Date.now()), 15000);
    onDisconnect(myRef).set(0);
}

/* ─── ESCAPE HTML ─── */
function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── PLAYER SELECT ─── */
function selectPlayer(p) {
    myPlayer = p;
    btnA.classList.toggle('active', p === 'andrey');
    btnN.classList.toggle('active', p === 'nayelys');
    localStorage.setItem('vor_player', p);
    setPresence();
    updateUI();
}

/* ─── EVENTS ─── */
btnA.addEventListener('click', () => selectPlayer('andrey'));
btnN.addEventListener('click', () => selectPlayer('nayelys'));
btnV.addEventListener('click', () => drawCard('verdad'));
btnR.addEventListener('click', () => drawCard('reto'));
btnRand.addEventListener('click', drawRandom);
chatBtn.addEventListener('click', sendMessage);
chatIn.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

/* ─── INIT ─── */
const saved = localStorage.getItem('vor_player');
selectPlayer(saved === 'nayelys' ? 'nayelys' : 'andrey');
listenGame();
listenChat();
listenPresence();
</script>
</body>
</html>
