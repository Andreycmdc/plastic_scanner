<style>
/* ── TOKENS ── */
:root {
  --ink:     #0a0608;
  --wine:    #1a0a10;
  --deep:    #120810;
  --gold:    #c9a96e;
  --gold2:   #e8c97e;
  --cream:   #e8d5c4;
  --muted:   rgba(232,213,196,0.38);
  --faint:   rgba(232,213,196,0.12);
  --border:  rgba(201,169,110,0.18);
  --red:     #8b1a3a;
  --red-dim: rgba(139,26,58,0.22);
  --green:   #2d6b4a;
  --green-dim:rgba(45,107,74,0.22);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html { height: 100%; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--ink);
  color: var(--cream);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  position: relative;
}

/* ── BACKGROUND TEXTURE ── */
body::before {
  content:'';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 10%, rgba(139,26,58,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 85% 80%, rgba(80,20,45,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(201,169,110,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* subtle noise grain */
body::after {
  content:'';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  padding: 0 20px 48px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
}

/* ── HEADER ── */
.hdr {
  text-align: center;
  padding: 36px 0 28px;
  flex-shrink: 0;
}

.hdr-monogram {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.hdr-monogram span {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.15rem;
  font-weight: 300;
  color: var(--gold);
  letter-spacing: 4px;
  text-transform: uppercase;
}
.hdr-monogram .sep {
  width: 32px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  letter-spacing: 0;
}

.hdr h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 3rem;
  font-weight: 300;
  letter-spacing: -1px;
  line-height: 0.95;
  color: var(--cream);
}
.hdr h1 em {
  font-style: italic;
  font-weight: 300;
  color: var(--gold);
}

.hdr-rule {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 16px;
  justify-content: center;
}
.hdr-rule::before,.hdr-rule::after {
  content:'';
  flex: 1;
  max-width: 60px;
  height: 1px;
  background: var(--border);
}
.hdr-rule-icon {
  font-size: 0.7rem;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}

/* ── PLAYER ROW ── */
.player-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
  flex-shrink: 0;
}
.pbtn {
  padding: 12px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.28s;
  position: relative;
  overflow: hidden;
}
.pbtn::after {
  content:'';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--gold);
  transform: scaleX(0);
  transition: transform 0.28s;
  transform-origin: center;
}
.pbtn.active {
  background: rgba(201,169,110,0.08);
  border-color: rgba(201,169,110,0.45);
  color: var(--gold2);
}
.pbtn.active::after { transform: scaleX(1); }

/* ── TURN STATUS ── */
.status-bar {
  text-align: center;
  margin-bottom: 24px;
  flex-shrink: 0;
}
.status-eyebrow {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 4px;
  display: block;
}
.status-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.5rem;
  font-weight: 400;
  color: var(--cream);
  display: block;
}
.status-name.pulse {
  color: var(--gold2);
  animation: goldpulse 1.4s ease-in-out infinite;
}
@keyframes goldpulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.45; }
}

/* ── MAIN CARD ── */
.card-stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-bottom: 28px;
  min-height: 220px;
}

.card-frame {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 36px 28px 32px;
  text-align: center;
  position: relative;
  background: rgba(26,10,16,0.6);
  backdrop-filter: blur(20px);
  overflow: hidden;
  transition: border-color 0.5s;
}

/* corner ornaments */
.card-frame::before,
.card-frame::after {
  content:'';
  position: absolute;
  width: 18px; height: 18px;
  border-color: var(--gold);
  border-style: solid;
  opacity: 0.4;
}
.card-frame::before { top:8px; left:8px; border-width:1px 0 0 1px; }
.card-frame::after  { bottom:8px; right:8px; border-width:0 1px 1px 0; }

.card-frame.v-active { border-color: rgba(45,107,74,0.5); }
.card-frame.r-active { border-color: rgba(139,26,58,0.6); }

/* lacre seal — the signature reveal */
.seal {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--wine);
  z-index: 2;
  transition: opacity 0.35s, transform 0.35s;
}
.seal.hidden { opacity:0; pointer-events:none; transform: scale(1.04); }

.seal-circle {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 1.5px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.seal-circle::before {
  content:'';
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  border: 1px solid rgba(201,169,110,0.3);
}
.seal-glyph {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  color: var(--gold);
  font-style: italic;
}

/* card content */
.card-type-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 3px;
  font-weight: 600;
  margin-bottom: 18px;
  display: block;
}
.label-v { color: #5ab887; }
.label-r { color: #c06080; }

.card-body-text {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.45rem;
  font-weight: 300;
  line-height: 1.55;
  color: var(--cream);
  letter-spacing: 0.2px;
}
.card-idle-text {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.1rem;
  font-style: italic;
  font-weight: 300;
  color: var(--muted);
  line-height: 1.6;
}

.card-content { position: relative; z-index: 1; }

@keyframes revealText {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
.card-content.revealed { animation: revealText 0.5s 0.2s both ease; }

/* ── ACTION BUTTONS ── */
.actions { flex-shrink: 0; margin-bottom: 20px; }

.action-main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.abtn {
  padding: 15px 10px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.abtn:disabled { opacity: 0.22; cursor: not-allowed; }
.abtn:not(:disabled):active { transform: scale(0.97); }

.abtn-v {
  border-color: rgba(45,107,74,0.4);
  color: #5ab887;
}
.abtn-v:not(:disabled):hover {
  background: rgba(45,107,74,0.14);
  border-color: rgba(45,107,74,0.7);
}

.abtn-r {
  border-color: rgba(139,26,58,0.5);
  color: #c06080;
}
.abtn-r:not(:disabled):hover {
  background: rgba(139,26,58,0.18);
  border-color: rgba(139,26,58,0.8);
}

.abtn-rand {
  width: 100%;
  border-color: rgba(201,169,110,0.28);
  color: var(--gold);
  letter-spacing: 2px;
}
.abtn-rand:not(:disabled):hover {
  background: rgba(201,169,110,0.08);
  border-color: rgba(201,169,110,0.55);
}

/* ── CHAT ── */
.chat-section {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}

.chat-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.chat-hdr-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: var(--muted);
  font-weight: 500;
}
.presence {
  display: flex;
  gap: 12px;
}
.pip {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.65rem;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.3px;
}
.pip-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  flex-shrink: 0;
}
.pip-dot.live {
  background: #5ab887;
  box-shadow: 0 0 5px rgba(90,184,135,0.7);
}

.msgs {
  max-height: 190px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 14px;
  padding-right: 2px;
}
.msgs::-webkit-scrollbar { width: 2px; }
.msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.no-msgs {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--muted);
  text-align: center;
  padding: 16px 0;
}

.bubble {
  max-width: 80%;
  padding: 10px 14px 8px;
  word-break: break-word;
  animation: msgIn 0.2s ease;
}
@keyframes msgIn { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none} }

.bubble.from-a {
  align-self: flex-end;
  border-radius: 12px 12px 2px 12px;
  background: rgba(139,26,58,0.2);
  border: 1px solid rgba(139,26,58,0.3);
}
.bubble.from-n {
  align-self: flex-start;
  border-radius: 12px 12px 12px 2px;
  background: rgba(80,40,100,0.2);
  border: 1px solid rgba(100,60,140,0.3);
}

.bubble-who {
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
  display: block;
  margin-bottom: 4px;
  color: var(--muted);
}
.bubble-text {
  font-size: 0.88rem;
  color: var(--cream);
  line-height: 1.45;
  font-weight: 300;
}
.bubble-time {
  font-size: 0.57rem;
  color: var(--muted);
  display: block;
  text-align: right;
  margin-top: 5px;
}

.chat-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.chat-field {
  flex: 1;
  padding: 12px 16px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 300;
  outline: none;
  transition: border-color 0.25s;
}
.chat-field::placeholder { color: var(--muted); }
.chat-field:focus { border-color: rgba(201,169,110,0.45); }
.chat-field:disabled { opacity: 0.28; cursor: not-allowed; }

.send-btn {
  padding: 12px 18px;
  border-radius: 3px;
  border: 1px solid rgba(201,169,110,0.3);
  background: transparent;
  color: var(--gold);
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.22s;
  -webkit-tap-highlight-color: transparent;
}
.send-btn:hover:not(:disabled) { background: rgba(201,169,110,0.1); }
.send-btn:disabled { opacity: 0.22; cursor: not-allowed; }

.chat-hint-line {
  text-align: center;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-top: 10px;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(26,10,16,0.95);
  border: 1px solid var(--border);
  color: var(--gold);
  font-size: 0.8rem;
  padding: 10px 22px;
  border-radius: 3px;
  letter-spacing: 0.5px;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
  backdrop-filter: blur(10px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 380px) {
  .hdr h1 { font-size: 2.5rem; }
  .card-body-text { font-size: 1.25rem; }
  .abtn { font-size: 0.75rem; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}
</style>
</head>

  "Nombra 3 cosas que quieres que te hagan y aún no has pedido",
  "Describe con detalle cómo sería el mejor beso que podrías dar",
  "Escribe qué llevarías puesto en la noche perfecta con tu pareja",
  "Manda un audio contando tu fantasía más reciente",
  "Escribe cómo te gustaría que comenzara una noche especial",
  "Confiesa algo que siempre has querido probar pero nunca has dicho",
  "Dedica una canción con un mensaje explicando exactamente por qué"
];

/* ─── STATE ─── */
let myPlayer   = 'andrey';
let turnPlayer = 'nayelys';
let curCard    = null;
let curType    = null;
let waiting    = false;
let lastMsgTs  = 0;
let presInt    = null;

/* ─── DOM ─── */
const btnA       = document.getElementById('btnA');
const btnN       = document.getElementById('btnN');
const btnV       = document.getElementById('btnV');
const btnR       = document.getElementById('btnR');
const btnRand    = document.getElementById('btnRand');
const statusEyebrow = document.getElementById('statusEyebrow');
const statusName    = document.getElementById('statusName');
const cardFrame  = document.getElementById('cardFrame');
const sealEl     = document.getElementById('seal');
const cardContent= document.getElementById('cardContent');
const msgsEl     = document.getElementById('msgs');
const chatField  = document.getElementById('chatField');
const sendBtn    = document.getElementById('sendBtn');
const hintLine   = document.getElementById('hintLine');
const presenceEl = document.getElementById('presence');
const toastEl    = document.getElementById('toast');

/* ─── HELPERS ─── */
const rand  = a => a[Math.floor(Math.random()*a.length)];
const fmtT  = ts => { const d=new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const esc   = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const scrollMsgs = () => { msgsEl.scrollTop = msgsEl.scrollHeight; };

let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

/* ─── UPDATE UI ─── */
function updateUI() {
  const who    = turnPlayer === 'nayelys' ? 'Nayelys' : 'Andrey';
  const other  = turnPlayer === 'nayelys' ? 'Andrey'  : 'Nayelys';
  const myTurn = myPlayer === turnPlayer;

  if (waiting) {
    if (myTurn) {
      statusEyebrow.textContent = 'responde ahora';
      statusName.textContent    = who;
      statusName.classList.add('pulse');
      chatField.disabled = false;
      sendBtn.disabled   = false;
      hintLine.textContent = 'Escribe tu respuesta y pulsa →';
      chatField.placeholder = 'Tu respuesta...';
      setTimeout(() => chatField.focus(), 120);
    } else {
      statusEyebrow.textContent = 'esperando respuesta de';
      statusName.textContent    = who;
      statusName.classList.remove('pulse');
      chatField.disabled = true;
      sendBtn.disabled   = true;
      hintLine.textContent = 'Espera la respuesta...';
    }
    btnV.disabled = btnR.disabled = btnRand.disabled = true;
  } else {
    const canChoose = myPlayer !== turnPlayer;
    btnV.disabled = btnR.disabled = btnRand.disabled = !canChoose;
    chatField.disabled = sendBtn.disabled = true;
    statusName.classList.remove('pulse');

    if (canChoose) {
      statusEyebrow.textContent = 'elige para';
      statusName.textContent    = who;
      hintLine.textContent      = 'Elige Verdad, Reto o Sorpresa';
    } else {
      statusEyebrow.textContent = 'esperando que elija';
      statusName.textContent    = other;
      hintLine.textContent      = 'Tu pareja está eligiendo para ti';
    }
  }
}

/* ─── REVEAL CARD ─── */
function revealCard(text, type, who) {
  // show seal first, then reveal
  sealEl.classList.remove('hidden');
  cardFrame.className = 'card-frame';
  cardContent.innerHTML = `<span class="card-idle-text">Elige para tu pareja<br>y descubre la carta</span>`;

  setTimeout(() => {
    sealEl.classList.add('hidden');
    if (type === 'verdad') {
      cardFrame.className = 'card-frame v-active';
      cardContent.innerHTML = `
        <span class="card-type-label label-v">Verdad · ${who}</span>
        <p class="card-body-text">${esc(text)}</p>
      `;
    } else {
      cardFrame.className = 'card-frame r-active';
      cardContent.innerHTML = `
        <span class="card-type-label label-r">Reto · ${who}</span>
        <p class="card-body-text">${esc(text)}</p>
      `;
    }
    cardContent.classList.remove('revealed');
    void cardContent.offsetWidth;
    cardContent.classList.add('revealed');
  }, 320);
}

function clearCard() {
  sealEl.classList.remove('hidden');
  cardFrame.className = 'card-frame';
  setTimeout(() => {
    sealEl.classList.add('hidden');
    cardContent.classList.remove('revealed');
    cardContent.innerHTML = `<span class="card-idle-text">Elige para tu pareja<br>y descubre la carta</span>`;
  }, 300);
}

/* ─── DRAW ─── */
async function drawCard(type) {
  const card = type === 'verdad' ? rand(VERDADES) : rand(RETOS);
  await set(ref(db,'verdadoreto/game'),{
    currentCard: card, currentType: type,
    turnPlayer, timestamp: Date.now()
  });
  showToast(type === 'verdad' ? 'Verdad enviada ✦' : 'Reto enviado ✦');
}

async function drawRandom() {
  await drawCard(Math.random()<0.5 ? 'verdad' : 'reto');
}

/* ─── NEXT TURN ─── */
async function nextTurn() {
  const next = turnPlayer === 'nayelys' ? 'andrey' : 'nayelys';
  await set(ref(db,'verdadoreto/game'),{
    currentCard:null, currentType:null, turnPlayer:next, timestamp:Date.now()
  });
}

/* ─── SEND ─── */
async function sendMessage() {
  const text = chatField.value.trim();
  if (!text || !waiting || myPlayer !== turnPlayer) return;
  chatField.value = '';
  chatField.disabled = true;
  sendBtn.disabled   = true;

  await push(ref(db,'verdadoreto/chat'),{
    from:myPlayer, text, timestamp:Date.now()
  });
  await nextTurn();
  showToast('Respuesta enviada ✦');
}

/* ─── FIREBASE LISTENERS ─── */
function listenGame() {
  onValue(ref(db,'verdadoreto/game'), snap => {
    if (!snap.exists()) {
      set(ref(db,'verdadoreto/game'),{
        currentCard:null,currentType:null,turnPlayer:'nayelys',timestamp:Date.now()
      });
      return;
    }
    const g     = snap.val();
    turnPlayer  = g.turnPlayer  || 'nayelys';
    curCard     = g.currentCard || null;
    curType     = g.currentType || null;
    waiting     = !!curCard;

    const who = turnPlayer === 'nayelys' ? 'Nayelys' : 'Andrey';

    if (curCard) {
      revealCard(curCard, curType, who);
    } else {
      clearCard();
    }
    updateUI();
  });
}

function listenChat() {
  onValue(ref(db,'verdadoreto/chat'), snap => {
    msgsEl.innerHTML = '';
    if (!snap.exists()) {
      msgsEl.innerHTML = '<p class="no-msgs">Las respuestas aparecerán aquí</p>';
      return;
    }
    const list = Object.values(snap.val()).sort((a,b)=>a.timestamp-b.timestamp);
    list.forEach(m => {
      const d = document.createElement('div');
      d.className = `bubble from-${m.from}`;
      d.innerHTML = `
        <span class="bubble-who">${m.from==='andrey'?'Andrey':'Nayelys'}</span>
        <span class="bubble-text">${esc(m.text)}</span>
        <span class="bubble-time">${fmtT(m.timestamp)}</span>
      `;
      msgsEl.appendChild(d);
    });
    scrollMsgs();

    if (list.length && waiting) {
      const last = list[list.length-1];
      if (last.from===turnPlayer && last.timestamp>lastMsgTs) {
        lastMsgTs = last.timestamp;
      }
    }
  });
}

function listenPresence() {
  onValue(ref(db,'verdadoreto/presence'), snap => {
    const p   = snap.exists() ? snap.val() : {};
    const now = Date.now();
    const aOn = p.andrey  && (now-p.andrey  < 35000);
    const nOn = p.nayelys && (now-p.nayelys < 35000);
    presenceEl.innerHTML = `
      <span class="pip"><span class="pip-dot ${aOn?'live':''}"></span>Andrey</span>
      <span class="pip"><span class="pip-dot ${nOn?'live':''}"></span>Nayelys</span>
    `;
  });
}

async function setPresence() {
  if (presInt) clearInterval(presInt);
  const r = ref(db,`verdadoreto/presence/${myPlayer}`);
  await set(r, Date.now());
  presInt = setInterval(()=>set(r,Date.now()), 14000);
  onDisconnect(r).set(0);
}

/* ─── PLAYER SELECT ─── */
function selectPlayer(p) {
  myPlayer = p;
  btnA.classList.toggle('active', p==='andrey');
  btnN.classList.toggle('active', p==='nayelys');
  localStorage.setItem('vor_p', p);
  setPresence();
  updateUI();
}

/* ─── EVENTS ─── */
btnA.addEventListener('click', ()=>selectPlayer('andrey'));
btnN.addEventListener('click', ()=>selectPlayer('nayelys'));
btnV.addEventListener('click', ()=>drawCard('verdad'));
btnR.addEventListener('click', ()=>drawCard('reto'));
btnRand.addEventListener('click', drawRandom);
sendBtn.addEventListener('click', sendMessage);
chatField.addEventListener('keypress', e=>{ if(e.key==='Enter') sendMessage(); });

/* ─── INIT ─── */
const saved = localStorage.getItem('vor_p');
selectPlayer(saved==='nayelys'?'nayelys':'andrey');
listenGame();
listenChat();
listenPresence();
</script>
