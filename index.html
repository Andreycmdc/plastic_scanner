<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>💕 Verdad o Reto · Andrey & Nayelys</title>
    
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .game-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            border-radius: 35px;
            padding: 20px 18px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        .header {
            margin-bottom: 18px;
        }

        .header-emoji {
            font-size: 3.5rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b9d, #ffa5b3, #ffb8c9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 4px 0;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .player-select {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 25px;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-select p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .player-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .player-btn {
            flex: 1;
            padding: 10px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .player-btn.andrey {
            border-color: #ff6b9d;
        }
        .player-btn.nayelys {
            border-color: #c084fc;
        }

        .player-btn.active {
            background: rgba(255, 107, 157, 0.25);
            border-color: #ff6b9d;
            color: white;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
        }
        .player-btn.nayelys.active {
            background: rgba(192, 132, 252, 0.25);
            border-color: #c084fc;
            box-shadow: 0 0 20px rgba(192, 132, 252, 0.3);
        }

        .player-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .card-display {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 25px;
            padding: 25px 18px;
            margin: 14px 0;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            word-break: break-word;
        }

        .card-content {
            font-size: 1.15rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.5;
        }

        .card-label {
            display: inline-block;
            padding: 5px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .label-verdad {
            background: rgba(72, 199, 142, 0.25);
            color: #7ac9a0;
            border: 1px solid rgba(72, 199, 142, 0.4);
        }

        .label-reto {
            background: rgba(255, 107, 157, 0.25);
            color: #ff8faa;
            border: 1px solid rgba(255, 107, 157, 0.4);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 14px;
        }

        .btn {
            border: none;
            padding: 14px 22px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex: 1 1 auto;
            min-width: 100px;
            letter-spacing: 0.3px;
            border: 2px solid transparent;
        }

        .btn-verdad {
            background: rgba(72, 199, 142, 0.2);
            color: #7ac9a0;
            border-color: rgba(72, 199, 142, 0.4);
        }

        .btn-verdad:hover {
            background: rgba(72, 199, 142, 0.35);
            transform: translateY(-2px);
        }

        .btn-reto {
            background: rgba(255, 107, 157, 0.2);
            color: #ff8faa;
            border-color: rgba(255, 107, 157, 0.4);
        }

        .btn-reto:hover {
            background: rgba(255, 107, 157, 0.35);
            transform: translateY(-2px);
        }

        .btn-random {
            background: rgba(192, 132, 252, 0.2);
            color: #c084fc;
            border-color: rgba(192, 132, 252, 0.4);
            font-size: 1rem;
            padding: 15px;
            width: 100%;
        }

        .btn-random:hover {
            background: rgba(192, 132, 252, 0.35);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .turn-indicator {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        .turn-indicator strong {
            color: #ff8faa;
        }

        /* CHAT INTEGRADO */
        .chat-section {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 25px;
            padding: 14px;
            margin-top: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .chat-title {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }

        .chat-messages {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 6px;
            margin-bottom: 10px;
        }

        .chat-msg {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            max-width: 85%;
            word-break: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-msg.andrey {
            background: rgba(255, 107, 157, 0.2);
            color: #ffb8c9;
            align-self: flex-end;
            margin-left: auto;
            border: 1px solid rgba(255, 107, 157, 0.3);
            border-radius: 20px 20px 4px 20px;
        }

        .chat-msg.nayelys {
            background: rgba(192, 132, 252, 0.2);
            color: #d8b4fe;
            align-self: flex-start;
            border: 1px solid rgba(192, 132, 252, 0.3);
            border-radius: 20px 20px 20px 4px;
        }

        .chat-msg .msg-sender {
            font-size: 0.7rem;
            font-weight: 700;
            display: block;
            margin-bottom: 2px;
            opacity: 0.8;
        }

        .chat-msg .msg-time {
            font-size: 0.6rem;
            opacity: 0.5;
            display: block;
            margin-top: 4px;
            text-align: right;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            color: white;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input:focus {
            border-color: rgba(255, 107, 157, 0.5);
            box-shadow: 0 0 15px rgba(255, 107, 157, 0.15);
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .chat-send-btn {
            padding: 10px 18px;
            border-radius: 50px;
            border: none;
            background: rgba(255, 107, 157, 0.3);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 107, 157, 0.4);
        }

        .chat-send-btn:hover {
            background: rgba(255, 107, 157, 0.5);
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }
        .online-dot.online { background: #7ac9a0; box-shadow: 0 0 8px #7ac9a0; }
        .online-dot.offline { background: #666; }

        @media (max-width: 400px) {
            .game-container { padding: 16px 12px; border-radius: 28px; }
            .btn { padding: 12px 14px; font-size: 0.8rem; }
            .card-content { font-size: 1rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- HEADER -->
        <div class="header">
            <span class="header-emoji">💘</span>
            <h1>Verdad o Reto</h1>
            <p class="subtitle">✨ Andrey & Nayelys ✨</p>
        </div>

        <!-- SELECCIÓN DE JUGADOR -->
        <div class="player-select">
            <p>👤 ¿Quién eres?</p>
            <div class="player-buttons">
                <button class="player-btn andrey active" id="btnSoyAndrey">💖 Andrey</button>
                <button class="player-btn nayelys" id="btnSoyNayelys">🦋 Nayelys</button>
            </div>
        </div>

        <!-- INDICADOR DE TURNO -->
        <p class="turn-indicator" id="turnMessage">
            🎯 Turno de: <strong id="currentPlayerText">Nayelys</strong>
        </p>

        <!-- CARTA -->
        <div id="cardLabel"></div>
        <div class="card-display" id="cardDisplay">
            <div class="card-content" id="cardContent">
                Presiona un botón<br>para comenzar 💫
            </div>
        </div>

        <!-- BOTONES -->
        <div class="button-group">
            <button class="btn btn-verdad" id="btnVerdad">💚 Verdad</button>
            <button class="btn btn-reto" id="btnReto">🔥 Reto</button>
        </div>
        <button class="btn btn-random" id="btnRandom">🎲 ¡Sorpresa!</button>

        <!-- CHAT PARA RESPONDER -->
        <div class="chat-section">
            <div class="chat-title">
                💬 Chat de respuestas 
                <span id="onlineStatus"></span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <p style="color:rgba(255,255,255,0.3);text-align:center;font-size:0.8rem;">Responde aquí las verdades o retos...</p>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Escribe tu respuesta..." maxlength="300">
                <button class="chat-send-btn" id="chatSendBtn">📩</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByB_5gP3sDwbCmVWbiB5CQXHzsKhcDvoo",
            authDomain: "chist-4aac2.firebaseapp.com",
            databaseURL: "https://chist-4aac2-default-rtdb.firebaseio.com",
            projectId: "chist-4aac2",
            storageBucket: "chist-4aac2.firebasestorage.app",
            messagingSenderId: "64011595640",
            appId: "1:64011595640:web:8fa8b005b916cf2af7628d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ========== PREGUNTAS ==========
        const verdades = [
            "¿Cuál fue el primer pensamiento que tuviste al despertar hoy?",
            "¿Qué canción te recuerda a nosotros y por qué?",
            "¿Cuál ha sido el momento más feliz que has vivido conmigo?",
            "Si pudieras viajar a cualquier lugar conmigo, ¿a dónde irías?",
            "¿Qué es lo que más te gusta de nuestra relación?",
            "¿Cuál fue la primera cosa que notaste de mí cuando nos conocimos?",
            "¿Tienes algún sueño que aún no me hayas contado?",
            "¿Qué es algo que siempre has querido hacer pero no te has atrevido?",
            "¿Cuál es tu recuerdo favorito de nosotros?",
            "¿Qué cualidad mía valoras más?",
            "Si pudieras cambiar algo de mí, ¿qué sería?",
            "¿Cuál fue el momento exacto en que supiste que me querías?",
            "¿Qué es algo que te da miedo contarme?",
            "¿Cuál es tu forma favorita de demostrar amor?",
            "¿Qué plan te haría más ilusión hacer conmigo este fin de semana?",
            "¿Alguna vez has sentido celos? ¿De qué?",
            "¿Qué palabra te gustaría que te dedicara ahora mismo?",
            "Si tuvieras que describirme con tres palabras, ¿cuáles serían?",
            "¿Cuál es el mejor cumplido que recuerdas haber recibido?",
            "¿Hay algo que te gustaría que hiciéramos más a menudo?",
            "¿Qué es lo más loco que harías por amor?",
            "¿Qué parte de mi personalidad te hace reír más?",
            "¿Cómo te imaginas dentro de 10 años a mi lado?",
            "¿Cuál ha sido el día más especial que hemos pasado juntos?",
            "¿Qué secreto guardas que crees que nunca descubriré?"
        ];

        const retos = [
            "📸 Tómate un selfie con la cara más divertida que puedas y compártelo",
            "🎤 Canta el coro de tu canción favorita (audio o video)",
            "💃 Baila 15 segundos sin música",
            "📝 Escribe un pequeño poema de 4 líneas para tu pareja",
            "🗣️ Di 'te quiero' en 5 idiomas diferentes",
            "🐱 Imita a un animal durante 10 segundos",
            "👀 Mantén contacto visual con la cámara por 20 segundos sin reírte",
            "🤗 Manda un audio diciendo lo primero que se te venga a la mente sobre ustedes",
            "🎨 Dibuja algo rápido que los represente",
            "📖 Cuenta una anécdota graciosa tuya en 1 minuto",
            "🎵 Tararea una canción y haz que el otro la adivine",
            "💌 Escribe una carta corta de amor en 2 minutos y léela",
            "🤸 Haz 5 saltos de tijera ahora mismo",
            "📱 Muestra la última foto que tomaste con el celular",
            "🗓️ Planea su próxima cita en 30 segundos",
            "🎭 Actúa una escena romántica de película",
            "🖐️ Toca tu nariz con la lengua (inténtalo)",
            "🤫 Quédate en silencio absoluto por 15 segundos",
            "🎁 Ofrece un 'vale' por algo que harás por el otro mañana",
            "🧸 Abraza algo suave y di que es tu pareja",
            "💖 Di tres cosas que amas de ti mismo/a en voz alta",
            "😱 Confiesa algo que nunca hayas dicho en voz alta",
            "📞 Llama a tu pareja y dile algo bonito (si están lejos)",
            "🪞 Haz una mueca graciosa frente al espejo",
            "🌟 Dedica una canción a tu pareja ya mismo"
        ];

        // ========== ESTADO ==========
        const state = {
            myPlayer: 'andrey', // 'andrey' o 'nayelys'
            myId: null,
            turnPlayer: 'nayelys', // quién debe responder (el otro elige)
            currentCard: null,
            currentType: null
        };

        // ========== DOM ==========
        const btnSoyAndrey = document.getElementById('btnSoyAndrey');
        const btnSoyNayelys = document.getElementById('btnSoyNayelys');
        const cardDisplay = document.getElementById('cardDisplay');
        const cardContent = document.getElementById('cardContent');
        const cardLabel = document.getElementById('cardLabel');
        const currentPlayerText = document.getElementById('currentPlayerText');
        const turnMessage = document.getElementById('turnMessage');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const onlineStatus = document.getElementById('onlineStatus');

        const btnVerdad = document.getElementById('btnVerdad');
        const btnReto = document.getElementById('btnReto');
        const btnRandom = document.getElementById('btnRandom');

        // ========== FUNCIONES ==========
        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function scrollChatToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        }

        // Escuchar cambios en el juego desde Firebase
        function listenGame() {
            const gameRef = ref(db, 'verdadoreto/game');
            onValue(gameRef, (snap) => {
                if (!snap.exists()) return;
                const game = snap.val();
                
                state.turnPlayer = game.turnPlayer || 'nayelys';
                state.currentCard = game.currentCard || null;
                state.currentType = game.currentType || null;
                
                updateTurnUI();
                
                if (game.currentCard) {
                    cardContent.textContent = game.currentCard;
                    if (game.currentType === 'verdad') {
                        cardLabel.innerHTML = '<span class="card-label label-verdad">💚 Verdad</span>';
                        cardDisplay.style.borderColor = 'rgba(72, 199, 142, 0.4)';
                    } else {
                        cardLabel.innerHTML = '<span class="card-label label-reto">🔥 Reto</span>';
                        cardDisplay.style.borderColor = 'rgba(255, 107, 157, 0.4)';
                    }
                } else {
                    cardContent.textContent = 'Presiona un botón\npara comenzar 💫';
                    cardLabel.innerHTML = '';
                    cardDisplay.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                }
            });
        }

        // Escuchar chat
        function listenChat() {
            const chatRef = ref(db, 'verdadoreto/chat');
            onValue(chatRef, (snap) => {
                chatMessages.innerHTML = '';
                if (!snap.exists()) {
                    chatMessages.innerHTML = '<p style="color:rgba(255,255,255,0.3);text-align:center;font-size:0.8rem;">No hay mensajes aún...</p>';
                    return;
                }
                
                const messages = Object.values(snap.val()).sort((a, b) => a.timestamp - b.timestamp);
                messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `chat-msg ${msg.from}`;
                    div.innerHTML = `
                        <span class="msg-sender">${msg.from === 'andrey' ? '💖 Andrey' : '🦋 Nayelys'}</span>
                        ${msg.text}
                        <span class="msg-time">${formatTime(msg.timestamp)}</span>
                    `;
                    chatMessages.appendChild(div);
                });
                
                scrollChatToBottom();
            });
        }

        // Escuchar presencia online
        function listenPresence() {
            const presenceRef = ref(db, 'verdadoreto/presence');
            onValue(presenceRef, (snap) => {
                if (!snap.exists()) {
                    onlineStatus.innerHTML = '<span class="online-dot offline"></span> Nadie conectado';
                    return;
                }
                const p = snap.val();
                const andreyOnline = p.andrey && (Date.now() - p.andrey < 30000);
                const nayelysOnline = p.nayelys && (Date.now() - p.nayelys < 30000);
                
                let html = '';
                html += `<span class="online-dot ${andreyOnline ? 'online' : 'offline'}"></span> Andrey `;
                html += `<span class="online-dot ${nayelysOnline ? 'online' : 'offline'}"></span> Nayelys`;
                onlineStatus.innerHTML = html;
            });
        }

        function updateTurnUI() {
            currentPlayerText.textContent = state.turnPlayer === 'nayelys' ? 'Nayelys' : 'Andrey';
            
            // Habilitar/deshabilitar botones según quién elige
            const canChoose = state.myPlayer !== state.turnPlayer;
            btnVerdad.disabled = !canChoose;
            btnReto.disabled = !canChoose;
            btnRandom.disabled = !canChoose;
            
            if (!canChoose) {
                turnMessage.innerHTML = '⏳ Espera que <strong>' + (state.turnPlayer === 'nayelys' ? 'Nayelys' : 'Andrey') + '</strong> responda...';
            } else {
                turnMessage.innerHTML = '🎯 Turno de: <strong>' + (state.turnPlayer === 'nayelys' ? 'Nayelys' : 'Andrey') + '</strong> (tú eliges)';
            }
        }

        async function drawCard(type) {
            const pregunta = type === 'verdad' ? getRandomItem(verdades) : getRandomItem(retos);
            
            // El que responde es el turnPlayer actual, luego se cambia
            const nextPlayer = state.turnPlayer === 'nayelys' ? 'andrey' : 'nayelys';
            
            await set(ref(db, 'verdadoreto/game'), {
                currentCard: pregunta,
                currentType: type,
                turnPlayer: nextPlayer,
                timestamp: Date.now()
            });
        }

        async function drawRandom() {
            const type = Math.random() < 0.5 ? 'verdad' : 'reto';
            await drawCard(type);
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            const msgRef = push(ref(db, 'verdadoreto/chat'));
            await set(msgRef, {
                from: state.myPlayer,
                text: text,
                timestamp: Date.now()
            });
            
            chatInput.value = '';
        }

        async function setPresence() {
            const myRef = ref(db, `verdadoreto/presence/${state.myPlayer}`);
            await set(myRef, Date.now());
            
            // Actualizar cada 15 segundos
            setInterval(async () => {
                await set(myRef, Date.now());
            }, 15000);
            
            // Limpiar al desconectar
            onDisconnect(myRef).set(0);
        }

        function selectPlayer(player) {
            state.myPlayer = player;
            
            btnSoyAndrey.classList.toggle('active', player === 'andrey');
            btnSoyNayelys.classList.toggle('active', player === 'nayelys');
            
            // Guardar preferencia
            localStorage.setItem('verdadoreto_player', player);
            
            // Reiniciar presencia
            setPresence();
            
            updateTurnUI();
        }

        // ========== EVENT LISTENERS ==========
        btnSoyAndrey.addEventListener('click', () => selectPlayer('andrey'));
        btnSoyNayelys.addEventListener('click', () => selectPlayer('nayelys'));
        
        btnVerdad.addEventListener('click', () => drawCard('verdad'));
        btnReto.addEventListener('click', () => drawCard('reto'));
        btnRandom.addEventListener('click', drawRandom);
        
        chatSendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // ========== INICIALIZACIÓN ==========
        function init() {
            // Cargar preferencia guardada
            const saved = localStorage.getItem('verdadoreto_player');
            if (saved === 'nayelys') {
                selectPlayer('nayelys');
            } else {
                selectPlayer('andrey');
            }
            
            listenGame();
            listenChat();
            listenPresence();
            setPresence();
            updateTurnUI();
            
            console.log('💕 Verdad o Reto · Andrey & Nayelys · Conectado');
        }

        init();
    </script>
</body>
</html>
