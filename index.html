<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>💕 Verdad o Reto · Nayelis</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #ffecd2, #fcb69f, #ff9a9e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: gradientBG 12s ease infinite;
            background-size: 300% 300%;
        }

        @keyframes gradientBG {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .game-container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px 24px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(180, 60, 80, 0.25);
            text-align: center;
            border: 3px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        .header-emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 6px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #b3405a;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #cc6b7a;
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .card-display {
            background: white;
            border-radius: 30px;
            padding: 32px 20px;
            margin: 20px 0 24px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #ffe0e6;
            box-shadow: 0 10px 20px rgba(200, 80, 100, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            word-break: break-word;
            position: relative;
            overflow: hidden;
        }

        .card-display::before {
            content: "";
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            background: #fff0f3;
            border-radius: 50%;
            opacity: 0.5;
        }

        .card-content {
            font-size: 1.35rem;
            font-weight: 600;
            color: #4a2c35;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        .card-label {
            display: inline-block;
            background: #ff7a8f;
            color: white;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .label-verdad {
            background: #7ac9a0;
        }

        .label-reto {
            background: #ff7a8f;
        }

        .button-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            border: none;
            padding: 16px 26px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1 1 auto;
            min-width: 130px;
            letter-spacing: 0.3px;
            border: 2px solid transparent;
        }

        .btn-verdad {
            background: #c7f0db;
            color: #1f5a3a;
            box-shadow: 0 8px 0 #8ec9a8;
        }

        .btn-verdad:hover {
            background: #b0e6ca;
            transform: translateY(-3px);
            box-shadow: 0 12px 0 #8ec9a8;
        }

        .btn-verdad:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #8ec9a8;
        }

        .btn-reto {
            background: #ffb6c1;
            color: #7a2e3b;
            box-shadow: 0 8px 0 #e8939f;
        }

        .btn-reto:hover {
            background: #ffa5b3;
            transform: translateY(-3px);
            box-shadow: 0 12px 0 #e8939f;
        }

        .btn-reto:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #e8939f;
        }

        .btn-random {
            background: white;
            color: #b3405a;
            border: 3px solid #ffb6c1;
            box-shadow: 0 8px 0 #ffe0e6;
            font-size: 1.2rem;
            padding: 18px 28px;
            width: 100%;
            margin-top: 6px;
            justify-content: center;
        }

        .btn-random:hover {
            background: #fff5f7;
            transform: translateY(-3px);
            box-shadow: 0 12px 0 #ffe0e6;
        }

        .btn-random:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #ffe0e6;
        }

        .player-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .player-badge {
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            border: 2px solid #ffe0e6;
            transition: all 0.3s;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .player-badge.active {
            background: #ff7a8f;
            color: white;
            border-color: #ff7a8f;
            box-shadow: 0 6px 0 #b3405a;
            transform: scale(1.05);
        }

        .turn-indicator {
            font-size: 0.9rem;
            color: #886060;
            margin-top: 18px;
            font-weight: 500;
        }

        .counter {
            background: #fff0f3;
            padding: 8px 18px;
            border-radius: 40px;
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #b3405a;
            margin-bottom: 10px;
        }

        @media (max-width: 400px) {
            .game-container {
                padding: 22px 16px;
            }
            .btn {
                padding: 14px 18px;
                font-size: 0.9rem;
            }
            .card-content {
                font-size: 1.15rem;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <span class="header-emoji">💘</span>
        <h1>Verdad o Reto</h1>
        <p class="subtitle">
            <span>✨ para Nayelis ✨</span>
        </p>

        <!-- Indicador de turno -->
        <div class="player-indicator">
            <span class="player-badge active" id="badgeTu">🌸 Tú</span>
            <span style="font-size: 1.5rem;">💞</span>
            <span class="player-badge" id="badgeNayelis">🦋 Nayelis</span>
        </div>

        <!-- Contador de preguntas -->
        <div class="counter">
            🎲 Jugadas: <span id="playCount">0</span>
        </div>

        <!-- Carta de pregunta/reto -->
        <div class="card-display" id="cardDisplay">
            <div class="card-content" id="cardContent">
                Presiona un botón<br>para comenzar 💫
            </div>
        </div>
        <div id="cardLabel" style="min-height: 28px;"></div>

        <!-- Botones principales -->
        <div class="button-group">
            <button class="btn btn-verdad" id="btnVerdad">
                💚 Verdad
            </button>
            <button class="btn btn-reto" id="btnReto">
                🔥 Reto
            </button>
        </div>

        <button class="btn btn-random" id="btnRandom">
            🎲 ¡Sorpresa!
        </button>

        <p class="turn-indicator" id="turnMessage">
            👆 Es turno de <strong id="currentPlayerText">Nayelis</strong>
        </p>
    </div>

    <script>
        // ========== PREGUNTAS PERSONALIZADAS PARA NAYELIS ==========
        
        const verdades = [
            "¿Cuál fue el primer pensamiento que tuviste al despertar hoy?",
            "¿Qué canción te recuerda a nosotros y por qué?",
            "¿Cuál ha sido el momento más feliz que has vivido conmigo?",
            "Si pudieras viajar a cualquier lugar conmigo, ¿a dónde irías?",
            "¿Qué es lo que más te gusta de nuestra relación?",
            "¿Cuál fue la primera cosa que notaste de mí cuando nos conocimos?",
            "¿Tienes algún sueño que aún no me hayas contado?",
            "¿Qué es algo que siempre has querido hacer pero no te has atrevido?",
            "¿Cuál es tu recuerdo favorito de nuestra infancia juntos?",
            "¿Qué cualidad mía valoras más?",
            "Si pudieras cambiar algo de mí, ¿qué sería?",
            "¿Cuál fue el momento exacto en que supiste que me querías?",
            "¿Qué es algo que te da miedo contarme?",
            "¿Cuál es tu forma favorita de demostrar amor?",
            "¿Qué plan te haría más ilusión hacer conmigo este fin de semana?",
            "¿Alguna vez has sentido celos? ¿De qué?",
            "¿Qué palabra te gustaría que te dedicara ahora mismo?",
            "Si tuvieras que describirme con tres palabras, ¿cuáles serían?",
            "¿Cuál es el mejor cumplido que recuerdas haber recibido?",
            "¿Hay algo que te gustaría que hiciéramos más a menudo?",
            "¿Qué es lo más loco que harías por amor?",
            "¿Qué parte de mi personalidad te hace reír más?",
            "¿Cómo te imaginas dentro de 10 años a mi lado?",
            "¿Cuál ha sido el día más especial que hemos pasado juntos?",
            "¿Qué secreto guardas que crees que nunca descubriré?"
        ];

        const retos = [
            "📸 Tómate un selfie con la cara más divertida que puedas",
            "🎤 Canta el coro de tu canción favorita",
            "💃 Baila 15 segundos sin música y grábate",
            "📝 Escribe un pequeño poema de 4 líneas para mí",
            "🗣️ Di 'te quiero' en 5 idiomas diferentes",
            "🐱 Imita a un animal durante 10 segundos",
            "👀 Mantén contacto visual con la cámara por 20 segundos sin reírte",
            "🤗 Manda un audio diciendo lo primero que se te venga a la mente sobre nosotros",
            "🎨 Dibuja algo rápido que nos represente y enséñamelo",
            "📖 Cuenta una anécdota graciosa tuya en 1 minuto",
            "🪞 Haz una mueca frente al espejo y manda foto",
            "🎵 Tararea una canción y haz que la adivine",
            "💌 Escribe una carta corta de amor en 2 minutos y léela",
            "🤸 Haz 5 saltos de tijera (jumping jacks) ahora mismo",
            "📱 Enséñame la última foto que tomaste con el celular",
            "🗓️ Planea nuestra próxima cita virtual en 30 segundos",
            "🎭 Actúa una escena romántica de película (tú eliges cuál)",
            "💬 Manda un mensaje a un amigo diciendo que me amas",
            "🖐️ Toca tu nariz con la lengua (inténtalo)",
            "📢 Grita '¡Nayelis es increíble!' (si puedes)",
            "🤫 Quédate en silencio absoluto por 15 segundos mirando la pantalla",
            "🎁 Ofréceme un 'vale' por algo que harás por mí mañana",
            "🧸 Abraza algo suave y di que soy yo",
            "🎤 Haz tu mejor imitación de un personaje famoso",
            "💖 Di tres cosas que amas de ti misma en voz alta"
        ];

        // ========== ESTADO DEL JUEGO ==========
        
        const state = {
            currentPlayer: 'nayelis', // nayelis o tu
            playCount: 0,
            currentCard: null,
            currentType: null // 'verdad' o 'reto'
        };

        // ========== ELEMENTOS DEL DOM ==========
        
        const badgeTu = document.getElementById('badgeTu');
        const badgeNayelis = document.getElementById('badgeNayelis');
        const cardDisplay = document.getElementById('cardDisplay');
        const cardContent = document.getElementById('cardContent');
        const cardLabel = document.getElementById('cardLabel');
        const playCountSpan = document.getElementById('playCount');
        const currentPlayerText = document.getElementById('currentPlayerText');
        const turnMessage = document.getElementById('turnMessage');

        const btnVerdad = document.getElementById('btnVerdad');
        const btnReto = document.getElementById('btnReto');
        const btnRandom = document.getElementById('btnRandom');

        // ========== FUNCIONES DEL JUEGO ==========
        
        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function updateUI() {
            // Actualizar badges de jugador activo
            if (state.currentPlayer === 'tu') {
                badgeTu.classList.add('active');
                badgeNayelis.classList.remove('active');
                currentPlayerText.textContent = 'Tú';
            } else {
                badgeNayelis.classList.add('active');
                badgeTu.classList.remove('active');
                currentPlayerText.textContent = 'Nayelis';
            }
            
            // Actualizar contador
            playCountSpan.textContent = state.playCount;
        }

        function drawCard(type) {
            let pregunta;
            
            if (type === 'verdad') {
                pregunta = getRandomItem(verdades);
                cardLabel.innerHTML = '<span class="card-label label-verdad">💚 Verdad</span>';
                cardDisplay.style.borderColor = '#c7f0db';
                cardDisplay.style.background = '#f9fffc';
            } else {
                pregunta = getRandomItem(retos);
                cardLabel.innerHTML = '<span class="card-label label-reto">🔥 Reto</span>';
                cardDisplay.style.borderColor = '#ffb6c1';
                cardDisplay.style.background = '#fff5f7';
            }
            
            cardContent.textContent = pregunta;
            state.currentCard = pregunta;
            state.currentType = type;
            state.playCount++;
            
            // Cambiar turno
            state.currentPlayer = state.currentPlayer === 'nayelis' ? 'tu' : 'nayelis';
            
            updateUI();
            
            // Pequeña vibración visual
            cardDisplay.style.transform = 'scale(1.03)';
            setTimeout(() => {
                cardDisplay.style.transform = 'scale(1)';
            }, 200);
        }

        function drawRandom() {
            const type = Math.random() < 0.5 ? 'verdad' : 'reto';
            drawCard(type);
        }

        // ========== EVENT LISTENERS ==========
        
        btnVerdad.addEventListener('click', () => drawCard('verdad'));
        btnReto.addEventListener('click', () => drawCard('reto'));
        btnRandom.addEventListener('click', drawRandom);

        // También permitir cambiar turno manualmente tocando el badge
        badgeTu.addEventListener('click', () => {
            if (state.currentPlayer !== 'tu') {
                state.currentPlayer = 'tu';
                updateUI();
            }
        });

        badgeNayelis.addEventListener('click', () => {
            if (state.currentPlayer !== 'nayelis') {
                state.currentPlayer = 'nayelis';
                updateUI();
            }
        });

        // ========== INICIALIZACIÓN ==========
        
        function init() {
            // Comienza Nayelis
            state.currentPlayer = 'nayelis';
            state.playCount = 0;
            updateUI();
            
            cardContent.textContent = 'Presiona un botón\npara comenzar 💫';
            cardLabel.innerHTML = '';
            cardDisplay.style.borderColor = '#ffe0e6';
            cardDisplay.style.background = 'white';
            
            console.log('💕 Verdad o Reto para Nayelis · ¡Listo para jugar!');
        }

        init();
    </script>
</body>
</html>
